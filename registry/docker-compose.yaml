services:
  registry:
    image: registry:3
    container_name: oci-registry
    restart: unless-stopped
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Origin: '[http://oci.home]'
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Methods: '[HEAD,GET,OPTIONS,DELETE]'
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Credentials: '[true]'
      REGISTRY_HTTP_HEADERS_Access-Control-Allow-Headers: '[Authorization,Accept,Cache-Control]'
      REGISTRY_HTTP_HEADERS_Access-Control-Expose-Headers: '[Docker-Content-Digest]'
      OTEL_TRACES_EXPORTER: "none"
      REGISTRY_LOG_LEVEL: warn
    volumes:
      - registry-data:/var/lib/registry
    labels:
      - "coredns.dockerdiscovery.host=registry.home"
    networks:
      app-network:
        ipv4_address: 192.168.40.47

  registry-ui:
    image: joxit/docker-registry-ui:main
    container_name: registry-ui
    restart: unless-stopped
    environment:
      - SINGLE_REGISTRY=true
      - REGISTRY_TITLE=Home OCI Registry
      - DELETE_IMAGES=true
      - NGINX_PROXY_PASS_URL=http://registry.home:5000
    labels:
      - "coredns.dockerdiscovery.host=oci.home"
    networks:
      app-network:
        ipv4_address: 192.168.40.48
    depends_on:
      - registry

volumes:
  registry-data:

networks:
  app-network:
    external: true

